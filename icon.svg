<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1E88E5"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 Z" fill="white"/>
    </marker>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="18" fill="url(#grad)"/>

  <!-- Top arc: left to right (clockwise upper semicircle) -->
  <path d="M 22 50 A 28 28 0 0 1 78 50"
        stroke="white" stroke-width="7" fill="none"
        stroke-linecap="round" marker-end="url(#arr)"/>

  <!-- Bottom arc: right to left (clockwise lower semicircle) -->
  <path d="M 78 50 A 28 28 0 0 1 22 50"
        stroke="white" stroke-width="7" fill="none"
        stroke-linecap="round" marker-end="url(#arr)"/>
</svg>
